{% extends 'base.html' %}

{% block content %}

<style>

.delete-container{
    max-width:500px;
    margin:auto;
}

.delete-card{
    background:#fff;
    border-radius:12px;
    padding:30px;
    border:1px solid #e0e0e0;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
    text-align:center;
}

.warning-icon{
    font-size:50px;
    margin-bottom:15px;
}

.room-info{
    background:#F8F7FF;
    border:1px solid #E0DEFF;
    border-radius:8px;
    padding:15px;
    margin:20px 0;
}

.warning-text{
    color:#dc3545;
    margin-bottom:20px;
}

.button-row{
    display:flex;
    gap:10px;
    margin-top:20px;
}

.delete-btn{
    flex:1;
    padding:12px;
    background:#dc3545;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
}

.delete-btn:hover{
    background:#bb2d3b;
}

.cancel-btn{
    flex:1;
    padding:12px;
    background:#534AB7;
    color:white;
    text-decoration:none;
    border-radius:8px;
    text-align:center;
}

.cancel-btn:hover{
    background:#3C3489;
}

</style>

<div class="delete-container">

    <div class="delete-card">

        <div class="warning-icon">
            ⚠️
        </div>

        <h2>Delete Room</h2>

        <p class="warning-text">
            This action cannot be undone.
        </p>

        <div class="room-info">

            <strong>
                Room {{ room.roomnumber }}
            </strong>

            <br><br>

            {{ room.roomtype }}

            <br>

            RM {{ room.price }}

        </div>

        <form method="POST">

            {% csrf_token %}

            <div class="button-row">

                <button type="submit"
                   class="delete-btn">
                    Delete
                </button>

                <a href="{% url 'owner_properties' %}"
                  class="cancel-btn">
                    Cancel
                </a>

            </div>

        </form>

    </div>

</div>

{% endblock %}
