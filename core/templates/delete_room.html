{% extends 'base.html' %}

{% block content %}

<h1>Delete Property</h1>

<p>Are you sure you want to delete this property?</p>

<p>Room Number: {{ room.roomnumber }}</p>
<p>Room Type: {{ room.roomtype }}</p>

<form method = 'POST'>
    {% csrf_token %}
    
    <button type = 'submit'>
        Confirm Delete
    </button>
</form>

<br>

<a href="{% url 'owner_properties' %}">
    <button type="button">
        Cancel
    </button>
</a>

{% endblock %}
