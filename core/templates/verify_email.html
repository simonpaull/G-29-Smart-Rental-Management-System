<!DOCTYPE html>
<html>
<head>
    <title>Email Verification</title>
</head>
<body>

<h2>Email Verification</h2>

<p>Enter the verification code sent to your email.</p>

<form method="POST">
    {% csrf_token %}

    <input
        type="text"
        name="otp"
        placeholder="Enter 6-digit code"
        required
    >

    <button type="submit">
        Verify
    </button>
</form>

{% if error %}
<p style="color:red;">
    {{ error }}
</p>
{% endif %}

</body>
</html>
