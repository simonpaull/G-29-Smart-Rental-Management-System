{% extends 'base.html' %}

{% block content %}

<style>

.complete-container{
    max-width:500px;
    margin:60px auto;
}

.complete-card{
    background:#fff;
    border-radius:20px;
    padding:45px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.complete-icon{
    font-size:70px;
    margin-bottom:20px;
}

.complete-title{
    font-size:30px;
    font-weight:700;
    color:#534AB7;
    margin-bottom:15px;
}

.complete-text{
    color:#666;
    line-height:1.8;
    margin-bottom:30px;
}

.login-btn{
    display:inline-block;
    width:100%;
    background:#534AB7;
    color:white;
    padding:14px;
    border-radius:10px;
    text-decoration:none;
    font-size:16px;
    font-weight:bold;
    transition:.3s;
}

.login-btn:hover{
    background:#4339A6;
}

</style>

<div class="complete-container">

    <div class="complete-card">

        <div class="complete-icon">
            ✅
        </div>

        <div class="complete-title">
            Password Reset Successful
        </div>

        <div class="complete-text">
            Your password has been updated successfully.
            <br><br>
            You can now log in using your new password.
        </div>

        <a href="{% url 'login' %}" class="login-btn">
            Login
        </a>

    </div>

</div>

{% endblock %}
