{% extends 'base.html' %}

{% block content %}

<style>
.reset-container{
    max-width:500px;
    margin:60px auto;
}

.reset-card{
    background:#fff;
    border-radius:20px;
    padding:40px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
    text-align:center;
}

.reset-icon{
    font-size:60px;
    margin-bottom:20px;
}

.reset-title{
    font-size:30px;
    font-weight:700;
    color:#534AB7;
    margin-bottom:10px;
}

.reset-text{
    color:#666;
    margin-bottom:30px;
    line-height:1.6;
}

.reset-card p{
    text-align:left;
    margin-bottom:8px;
    font-weight:600;
    color:#444;
}

.reset-card input{
    width:100%;
    padding:14px 16px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:15px;
    margin-bottom:20px;
    transition:.3s;
}

.reset-card input:focus{
    outline:none;
    border-color:#534AB7;
    box-shadow:0 0 8px rgba(83,74,183,.2);
}

.reset-btn{
    width:100%;
    background:#534AB7;
    color:white;
    border:none;
    border-radius:10px;
    padding:14px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.reset-btn:hover{
    background:#4339A6;
}

.back-login{
    display:inline-block;
    margin-top:20px;
    text-decoration:none;
    color:#534AB7;
    font-weight:600;
}

.back-login:hover{
    text-decoration:underline;
}
</style>

<div class="reset-container">

    <div class="reset-card">

        <div class="reset-icon">
            🔑
        </div>

        <div class="reset-title">
            Forgot Password?
        </div>

        <div class="reset-text">
            Enter your email address below and we'll send you a password reset link.
        </div>

        <form method="POST">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="reset-btn">
                Send Reset Link
            </button>

        </form>

        <a href="/login/" class="back-login">
            ← Back to Login
        </a>

    </div>

</div>

{% endblock %}
