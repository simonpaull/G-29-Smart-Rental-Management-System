{% extends 'base.html' %}

{% block content %}

<style>

.done-container{
    max-width:500px;
    margin:60px auto;
}

.done-card{
    background:#fff;
    border-radius:20px;
    padding:45px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.done-icon{
    font-size:65px;
    margin-bottom:20px;
}

.done-title{
    font-size:30px;
    font-weight:700;
    color:#534AB7;
    margin-bottom:15px;
}

.done-text{
    color:#666;
    line-height:1.8;
    margin-bottom:30px;
}

.done-btn{
    display:inline-block;
    background:#534AB7;
    color:white;
    padding:14px 30px;
    border-radius:10px;
    text-decoration:none;
    font-weight:600;
    transition:.3s;
}

.done-btn:hover{
    background:#4339A6;
}

</style>

<div class="done-container">

    <div class="done-card">

        <div class="done-icon">
            📧
        </div>

        <div class="done-title">
            Email Sent!
        </div>

        <div class="done-text">

            We've sent a password reset link to your email.

            <br><br>

            Please check your inbox and follow the instructions to reset your password.

        </div>

        <a href="/login/" class="done-btn">

            Back to Login

        </a>

    </div>

</div>

{% endblock %}
