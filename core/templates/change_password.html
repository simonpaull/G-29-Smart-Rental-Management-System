{% extends 'base.html' %}

{% block content %}
<h2>Change Password</h2>

<form method="POST">
    {% csrf_token %}

    {% if form.errors %}
        <div style="color:red;">
            <strong>Errors:</strong>
            {{ form.errors }}
        </div>
    {% endif %}

    {{ form.as_p }}

    <button type="submit">Change Password</button>
</form>

<a href="/profile/">Back to Profile</a>
{% endblock %}
