{% extends 'base.html' %}

{% block content %}

<style>

.register-container{
    max-width:650px;
    margin:auto;
    padding:30px 0;
}
.register-card{
    background:#fff;
    border-radius:20px;
    padding:45px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.register-header{
    text-align:center;
    margin-bottom:35px;
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.full-width{
    grid-column:1 / -1;
}

@media(max-width:700px){

    .form-grid{
        grid-template-columns:1fr;
    }

}

.register-icon{
    font-size:60px;
    margin-bottom:10px;
}

.register-header h2{
    color:#534AB7;
    margin-bottom:10px;
    font-size:32px;
}

.register-header p{
    color:#666;
}

.form-group{
    margin-bottom:20px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
    color:#444;
}

.form-group input,
.form-group textarea{
    width:100%;
    padding:14px 16px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:15px;
    transition:.3s;
    box-sizing:border-box;
}

.form-group textarea{
    resize:vertical;
    min-height:90px;
}

.form-group input:focus,
.form-group textarea:focus{
    outline:none;
    border-color:#534AB7;
    box-shadow:0 0 8px rgba(83,74,183,.2);
}

.password-box{
    position:relative;
}

.password-box input{
    padding-right:50px;
}

.eye-btn{
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    font-size:20px;
    user-select:none;
}

.register-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#534AB7;
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

.register-btn:hover{
    background:#4339A6;
}

.error-box{
    background:#FDECEC;
    border-left:5px solid #E74C3C;
    color:#C0392B;
    padding:15px;
    border-radius:10px;
    margin-bottom:20px;
}

.login-link{
    text-align:center;
    margin-top:25px;
}

.login-link a{
    color:#534AB7;
    text-decoration:none;
    font-weight:bold;
}

.login-link a:hover{
    text-decoration:underline;
}

</style>

<div class="register-container">

<div class="register-card">

<div class="register-header">

<div class="register-icon">
👤
</div>

<h2>Create Account</h2>

<p>
Register as a new tenant to browse rooms,
submit applications and communicate with owners.
</p>

</div>

{% if error %}
<div class="error-box">
{{ error }}
</div>
{% endif %}

<form method="POST">

{% csrf_token %}

<div class="form-grid">

<div class="form-group">

<label>Full Name</label>

<input
type="text"
name="full_name"
required>

</div>

<div class="form-group">

<label>Username</label>

<input
type="text"
name="username"
required>

</div>

<div class="form-group">

<label>Email Address</label>

<input
type="email"
name="email"
required>

</div>

<div class="form-group">

<label>Phone Number</label>

<input
type="text"
name="phone_number"
required>

</div>

<div class="form-group full-width">

<label>Address</label>

<textarea
name="address"
required></textarea>

</div>

<div class="form-group full-width">

<label>Password</label>

<div class="password-box">

<input
type="password"
id="registerPassword"
name="password"
required>

<span
id="registerEye"
class="eye-btn"
onclick="toggleRegisterPassword()">

👁

</span>

</div>

</div>

<div class="full-width">

<button
type="submit"
class="register-btn">

Create Account

</button>

</div>

</div>

</form>

<div class="login-link">
    Already have an account?
    <a href="/login/">Login here</a>
</div>

</div>   <!-- register-card -->

</div>   <!-- register-container -->


<script>

function toggleRegisterPassword(){

let password=document.getElementById("registerPassword");

let eye=document.getElementById("registerEye");

if(password.type==="password"){

password.type="text";

eye.innerHTML="🙈";

}

else{

password.type="password";

eye.innerHTML="👁";

}

}

</script>

{% endblock %}
