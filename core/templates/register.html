{% extends 'base.html' %}

{% block content %}
<h2>Tenant Registration</h2>

<p>Create an account to search and rent available rooms.</p>

<form method="POST">
    {% csrf_token %}

    <label>Full Name:</label><br>
    <input type="text" name="full_name" placeholder="Enter full name" required><br><br>

    <label>Username:</label><br>
    <input type="text" name="username" placeholder="Enter username" required><br><br>

    <label>Email:</label><br>
    <input type="email" name="email" placeholder="Enter email" required><br><br>

    <label>Phone Number:</label><br>
    <input type="text" name="phone_number" placeholder="Enter phone number" required><br><br>

    <label>Address:</label><br>
    <textarea name="address" placeholder="Enter address" required></textarea><br><br>

    <label>Password:</label><br>
    <input type="password" name="password" placeholder="Enter password" required><br><br>

    <input type="hidden" name="role" value="tenant">

    <button type="submit">Register</button>
</form>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

<p>Already have an account? <a href="/login/">Login here</a></p>

{% endblock %}
