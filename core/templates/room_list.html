<!DOCTYPE html>
<html>
<head>
    <title>Room List</title>
</head>
<body>
    <h1>Room List</h1>

    {% for room in rooms %}
        <div>
            <p>Room Number: {{ room.roomnumber }}</p>
            <p>Room Type: {{ room.roomtype }}</p>
            <p>Size: {{ room.size }}</p>
            <p>Price: RM {{ room.price }}</p>
            <p>availablility: {{ room.availablility }}</p>
            <p>Description: {{ room.description }}</p>
            <hr>
        </div>
    {% empty %}
        <p>No rooms available.</p>
    {% endfor %}
</body>
</html>
