{% extends 'base.html' %}

{% block content %}

<style>

.success-container{
    max-width:650px;
    margin:50px auto;
}

.success-card{
    background:#fff;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
    animation:fadeIn .35s ease;
}

.success-header{
    background:linear-gradient(135deg,#534AB7,#6E63E8);
    color:white;
    text-align:center;
    padding:45px;
}

.success-icon{
    width:100px;
    height:100px;
    margin:0 auto 20px;
    border-radius:50%;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:55px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.success-header h2{
    margin:0;
    font-size:34px;
}

.success-header p{
    margin-top:10px;
    opacity:.9;
    font-size:17px;
}

.success-body{
    padding:40px;
    text-align:center;
}

.success-message{
    font-size:18px;
    color:#555;
    line-height:1.7;
    margin-bottom:35px;
}

.button-group{
    display:flex;
    justify-content:center;
    gap:18px;
    flex-wrap:wrap;
}

.logout-btn{
    background:#534AB7;
    color:white;
    text-decoration:none;
    padding:15px 35px;
    border-radius:10px;
    font-weight:bold;
    transition:.3s;
}

.logout-btn:hover{
    background:#4339A6;
    transform:translateY(-2px);
}

.profile-btn{
    background:#F4F4F4;
    color:#333;
    text-decoration:none;
    padding:15px 35px;
    border-radius:10px;
    font-weight:bold;
    transition:.3s;
}

.profile-btn:hover{
    background:#E5E5E5;
}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(15px);
}

to{
opacity:1;
transform:translateY(0);
}

}

@media(max-width:700px){

.success-body{
padding:25px;
}

.button-group{
flex-direction:column;
}

.logout-btn,
.profile-btn{
width:100%;
text-align:center;
}

}

</style>

<div class="success-container">

<div class="success-card">

<div class="success-header">

<div class="success-icon">
✅
</div>

<h2>Password Updated!</h2>

<p>
Your password has been changed successfully.
</p>

</div>

<div class="success-body">

<div class="success-message">

Your account is now protected with your new password.

For security, you can log out and sign in again using your new password.

</div>

<div class="button-group">

<a href="/logout/" class="logout-btn">

<i class="fa-solid fa-right-from-bracket"></i>

Logout

</a>

<a href="/profile/" class="profile-btn">

<i class="fa-solid fa-user"></i>

Back to Profile

</a>

</div>

</div>

</div>

</div>

{% endblock %}
