<h2>Edit Profile</h2>

<form method="POST">
    {% csrf_token %}

    <label>Phone:</label>
    <input type="text" name="phone_number" value="{{ profile.phone_number }}"><br>

    <label>Address:</label>
    <input type="text" name="address" value="{{ profile.address }}"><br>

    <button type="submit">Save</button>
</form>

<a href="/profile/">Back</a>
