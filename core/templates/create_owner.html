{% extends 'base.html' %}

{% block content %}

<style>

.owner-container{
    max-width:720px;
    margin:40px auto;
}

.owner-card{
    background:#fff;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
    animation:fadeIn .35s ease;
}

.owner-header{
    background:linear-gradient(135deg,#534AB7,#6E63E8);
    color:#fff;
    text-align:center;
    padding:40px;
}

.owner-icon{
    width:100px;
    height:100px;
    margin:0 auto 20px;
    background:#fff;
    color:#534AB7;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:50px;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.owner-header h2{
    margin:0;
    font-size:32px;
}

.owner-header p{
    margin-top:10px;
    opacity:.9;
    font-size:16px;
}

.owner-body{
    padding:40px;
}

.form-group{
    margin-bottom:22px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
    color:#444;
}

.form-group input,
.form-group textarea{
    width:100%;
    padding:14px 16px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:15px;
    box-sizing:border-box;
    transition:.3s;
}

.form-group textarea{
    resize:vertical;
    min-height:120px;
}

.form-group input:focus,
.form-group textarea:focus{
    outline:none;
    border-color:#534AB7;
    box-shadow:0 0 8px rgba(83,74,183,.2);
}

.password-wrapper{
    position:relative;
}

.password-wrapper input{
    padding-right:50px;
}

.password-toggle{
    position:absolute;
    right:18px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    user-select:none;
    font-size:20px;
    color:#777;
}

.password-toggle:hover{
    color:#534AB7;
}

.button-group{
    display:flex;
    justify-content:center;
    gap:18px;
    margin-top:35px;
    flex-wrap:wrap;
}

.create-btn{
    background:#534AB7;
    color:#fff;
    border:none;
    padding:15px 35px;
    border-radius:10px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

.create-btn:hover{
    background:#4339A6;
    transform:translateY(-2px);
}

.back-btn{
    background:#F4F4F4;
    color:#333;
    text-decoration:none;
    padding:15px 35px;
    border-radius:10px;
    font-weight:bold;
    transition:.3s;
}

.back-btn:hover{
    background:#E5E5E5;
}

.error-box{
    background:#FDECEC;
    border-left:5px solid #E74C3C;
    color:#C0392B;
    border-radius:10px;
    padding:15px;
    margin-bottom:25px;
}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(15px);
}

to{
opacity:1;
transform:translateY(0);
}

}

@media(max-width:700px){

.owner-body{
padding:25px;
}

.button-group{
flex-direction:column;
}

.create-btn,
.back-btn{
width:100%;
text-align:center;
}

}

</style>

<div class="owner-container">

<div class="owner-card">

<div class="owner-header">

<div class="owner-icon">
<i class="fa-solid fa-user-tie"></i>
</div>

<h2>Create Owner Account</h2>

<p>
Register a new property owner into the Smart Rental System.
</p>

</div>

<div class="owner-body">

<form method="POST">

{% csrf_token %}

{% if error %}
<div class="error-box">
{{ error }}
</div>
{% endif %}

<div class="form-group">

<label>Full Name</label>

<input
type="text"
name="full_name"
placeholder="Enter full name"
required>

</div>

<div class="form-group">

<label>Username</label>

<input
type="text"
name="username"
placeholder="Enter username"
required>

</div>

<div class="form-group">

<label>Email Address</label>

<input
type="email"
name="email"
placeholder="Enter email address"
required>

</div>

<div class="form-group">

<label>Password</label>

<div class="password-wrapper">

<input
type="password"
name="password"
id="ownerPassword"
placeholder="Enter password"
required>

<span
class="password-toggle"
onclick="togglePassword()">
👁
</span>

</div>

</div>

<div class="form-group">

<label>Phone Number</label>

<input
type="text"
name="phone_number"
placeholder="Enter phone number"
required>

</div>

<div class="form-group">

<label>Address</label>

<textarea
name="address"
placeholder="Enter full address"
required></textarea>

</div>

<div class="button-group">

<button
type="submit"
class="create-btn">

<i class="fa-solid fa-user-plus"></i>

Create Owner

</button>

<a
href="/payment/admin-panel/"
class="back-btn">

<i class="fa-solid fa-arrow-left"></i>

Back

</a>

</div>

</form>

</div>

</div>

</div>

<script>

function togglePassword(){

let input=document.getElementById("ownerPassword");

if(input.type==="password"){

input.type="text";

}

else{

input.type="password";

}

}

</script>

{% endblock %}
