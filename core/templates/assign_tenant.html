{% extends 'base.html' %}

{% block content %}

<h1>Assign Tenant</h1>

<p>Room Number: {{ room.roomnumber }}</p>


<form method="POST">
    {% csrf_token %}

    <label>Select Tenant:</label>
    
    <input
        type = 'text'
        name = 'tenant'
    ><br><br>

    <button type="submit">Assign</button>
</form>


{% endblock %}
