<!DOCTYPE html>
<html>
<head>
    <title>Create Payment</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #F4F3FF; font-family: Arial, sans-serif; }
        .topbar { background: #534AB7; padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; }
        .topbar-title { color: #fff; font-size: 15px; font-weight: 500; }
        .hero { background: #534AB7; padding: 1.5rem 1.5rem 2rem; color: #fff; }
        .hero h1 { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
        .hero p { font-size: 13px; opacity: 0.8; }
        .content { padding: 1rem; max-width: 500px; margin: 1rem auto 2rem; }
        .back-link { display: inline-block; color: #534AB7; font-size: 13px; text-decoration: none; margin-bottom: 1rem; }
        .card { background: #fff; border-radius: 12px; padding: 1.25rem; border: 0.5px solid #e0e0e0; }
        .card-title { font-size: 15px; font-weight: 500; color: #333; margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 0.5px solid #f0f0f0; }
        .field { margin-bottom: 14px; }
        .field label { display: block; font-size: 13px; color: #666; margin-bottom: 5px; }
        .field input, .field select { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; color: #333; outline: none; }
        .field input:focus, .field select:focus { border-color: #534AB7; box-shadow: 0 0 0 3px rgba(83,74,183,0.08); }
        .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .info-box { background: #F8F7FF; border-radius: 8px; padding: 12px; margin-bottom: 14px; font-size: 13px; color: #534AB7; border: 1px solid #E0DEFF; }
        .room-info { background: #EAF3DE; border-radius: 8px; padding: 10px 12px; margin-top: 6px; font-size: 13px; color: #3B6D11; display: none; }
        .submit-btn { width: 100%; padding: 13px; background: #534AB7; color: #fff; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; font-weight: 500; }
        .submit-btn:hover { background: #3C3489; }
        @media (max-width: 400px) { .grid2 { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="topbar-title">Smart Rental System — Admin</div>
    </div>

    <div class="hero">
        <h1>Create payment</h1>
        <p>Rent amount is auto read from room details</p>
    </div>

    <div class="content">
        <a class="back-link" href="/payment/owner-dashboard/">← Back to dashboard</a>
        <a class="back-link" href="/payment/admin-summary/" style="margin-left: 12px;">View summary</a>
        <div class="card">
            <div class="card-title">Payment details</div>

            <div class="info-box">
                Select a tenant — rent amount will be automatically filled from their room details.
            </div>

            <form method="POST">
                {% csrf_token %}

                <div class="field">
                    <label>Tenant</label>
                    <select name="tenant_id" id="tenant-select" required onchange="showRoomInfo(this)">
                        <option value="">Select tenant...</option>
                        {% for t in tenants %}
                        <option value="{{ t.id }}"
                            data-room="{{ t.room.roomnumber }}"
                            data-rent="{{ t.room.price }}"
                            data-type="{{ t.room.roomtype }}">
                            {{ t.name }} — Unit {{ t.room.roomnumber }}
                        </option>
                        {% endfor %}
                    </select>
                    <div class="room-info" id="room-info"></div>
                </div>

                <div class="grid2">
                    <div class="field">
                        <label>Period month</label>
                        <select name="period_month" required>
                            {% for m in month_choices %}
                            <option value="{{ m }}">{{ m }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="field">
                        <label>Period year</label>
                        <select name="period_year" required>
                            {% for y in year_choices %}
                            <option value="{{ y }}">{{ y }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="grid2">
                    <div class="field">
                        <label>Electric (RM)</label>
                        <input type="number" name="electric" placeholder="0.00" step="0.01" value="0">
                    </div>
                    <div class="field">
                        <label>Water (RM)</label>
                        <input type="number" name="water" placeholder="0.00" step="0.01" value="0">
                    </div>
                </div>

                <div class="field">
                    <label>Due date</label>
                    <input type="date" name="due_date" required>
                </div>

                <button class="submit-btn" type="submit">Create payment</button>
            </form>
        </div>
    </div>

    <script>
        function showRoomInfo(select) {
            const option = select.options[select.selectedIndex];
            const info = document.getElementById('room-info');
            if (option.value) {
                info.style.display = 'block';
                info.innerHTML = `
                    Unit: <strong>${option.dataset.room}</strong> |
                    Type: <strong>${option.dataset.type}</strong> |
                    Rent: <strong>RM ${option.dataset.rent}</strong>
                `;
            } else {
                info.style.display = 'none';
            }
        }
    </script>
</body>
</html>
