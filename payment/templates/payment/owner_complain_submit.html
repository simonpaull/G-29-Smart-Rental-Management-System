<!DOCTYPE html>
<html>
<head>
    <title>File Complaint Against Tenant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #F4F3FF; font-family: Arial, sans-serif; }
        .topbar { background: #534AB7; padding: 1rem 1.5rem; }
        .topbar-title { color: #fff; font-size: 15px; font-weight: 500; }
        .hero { background: #534AB7; padding: 1.5rem 1.5rem 2rem; color: #fff; }
        .hero h1 { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
        .hero p { font-size: 13px; opacity: 0.8; }
        .content { padding: 1rem; max-width: 500px; margin: 1rem auto 2rem; }
        .back-link { display: inline-block; color: #534AB7; font-size: 13px; text-decoration: none; margin-bottom: 1rem; }
        .card { background: #fff; border-radius: 12px; padding: 1.25rem; border: 0.5px solid #e0e0e0; }
        .field { margin-bottom: 14px; }
        .field label { display: block; font-size: 13px; color: #666; margin-bottom: 5px; }
        .field input, .field select, .field textarea { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
        .field textarea { height: 120px; resize: vertical; }
        .submit-btn { width: 100%; padding: 13px; background: #E24B4A; color: #fff; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; font-weight: 500; }
    </style>
</head>
<body>
    <div class="topbar"><div class="topbar-title">Smart Rental System</div></div>
    <div class="hero">
        <h1>File a complaint against tenant</h1>
        <p>Report tenant misconduct to admin for review</p>
    </div>
    <div class="content">
        <a class="back-link" href="/payment/admin-panel/">← Back to admin panel</a>
        <div class="card">
            <form method="POST">
                {% csrf_token %}
                <div class="field">
                    <label>Tenant</label>
                    <select name="against_user" required>
                        <option value="">Select tenant...</option>
                        {% for t in tenants %}
                        <option value="{{ t.id }}">{{ t.get_full_name|default:t.username }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="field">
                    <label>Title</label>
                    <input type="text" name="title" placeholder="Brief summary" required>
                </div>
                <div class="field">
                    <label>Description</label>
                    <textarea name="description" placeholder="Describe the issue..." required></textarea>
                </div>
                <div class="field">
                    <label>Priority</label>
                    <select name="priority">
                        <option value="low">Low</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>
                <button class="submit-btn" type="submit">Submit complaint</button>
            </form>
        </div>
    </div>
</body>
</html>
