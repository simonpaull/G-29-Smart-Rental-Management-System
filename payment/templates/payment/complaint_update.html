<!DOCTYPE html>
<html>
<head>
    <title>Update Complaint</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 40px auto; padding: 0 20px; }
        h2 { margin-bottom: 6px; }
        .complaint-info { background: #f5f5f5; border-radius: 8px; padding: 16px; margin-bottom: 20px; font-size: 14px; }
        .row { display: flex; justify-content: space-between; padding: 4px 0; }
        .field { margin-bottom: 14px; }
        .field label { display: block; font-size: 13px; color: #555; margin-bottom: 5px; }
        .field select, .field textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
        .field textarea { height: 100px; resize: vertical; }
        .save-btn { width: 100%; padding: 12px; background: #534AB7; color: white; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; }
        .save-btn:hover { background: #3C3489; }
        .badge-high { color: red; font-weight: bold; }
        .badge-medium { color: orange; font-weight: bold; }
        .badge-low { color: green; font-weight: bold; }
        a { color: #534AB7; }
    </style>
</head>
<body>
    <h2>Update complaint</h2>

    <div class="complaint-info">
        <div class="row"><span>Tenant</span><span>{{ complaint.tenant.get_full_name|default:complaint.tenant.username }}</span></div>
        <div class="row"><span>Title</span><span>{{ complaint.title }}</span></div>
        <div class="row">
            <span>Priority</span>
            <span class="badge-{{ complaint.priority }}">{{ complaint.priority|capfirst }}</span>
        </div>
        <div class="row"><span>Description</span></div>
        <p style="font-size:13px; color:#555;">{{ complaint.description }}</p>
    </div>

    <form method="POST">
        {% csrf_token %}
        <div class="field">
            <label>Update status</label>
            <select name="status">
                <option value="pending" {% if complaint.status == 'pending' %}selected{% endif %}>Pending</option>
                <option value="in_progress" {% if complaint.status == 'in_progress' %}selected{% endif %}>In Progress</option>
                <option value="resolved" {% if complaint.status == 'resolved' %}selected{% endif %}>Resolved</option>
            </select>
        </div>
        <div class="field">
            <label>Admin notes</label>
            <textarea name="admin_notes" placeholder="Add notes for the tenant...">{{ complaint.admin_notes }}</textarea>
        </div>
        <button class="save-btn" type="submit">Save update</button>
    </form>
    <br>
    <a href="/payment/complaint/admin/">Back to all complaints</a>
</body>
</html>
